<script>
    // Initialize data structure
    let appData = {
        currentDate: new Date().toISOString().split('T')[0],
        streak: 0,
        lastCompletedDate: null,
        weeklyProgress: [false, false, false, false, false, false, false],
        history: {},  // This stores past days (not today)
        todayData: {}, // This stores today's data separately
        contentPlan: generateDefaultContentPlan(),
        quotes: [
            { text: "Discipline is the bridge between goals and accomplishment.", author: "Jim Rohn" },
            { text: "Success is the sum of small efforts, repeated day in and day out.", author: "Robert Collier" },
            { text: "The future depends on what you do today.", author: "Mahatma Gandhi" }
        ]
    };

    let currentEditDate = null;

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
        console.log('GrowthOS initializing...');
        loadData();
        updateDateDisplay();
        initializeTodayData();
        renderAll();
        loadRandomQuote();
        refreshAISuggestions();
        console.log('GrowthOS initialized! Data:', appData);
    });

    function generateDefaultContentPlan() {
        const plan = [];
        const topics = [
            { hook: "Why 99% traders fail", topic: "Discipline in trading", cta: "Follow for real strategies" },
            { hook: "I posted 50 reels — here's what happened", topic: "Consistency", cta: "Comment 'growth'" },
            { hook: "Don't start Web3 like this", topic: "Beginner mistakes", cta: "Save this" },
            { hook: "The truth about Solana NFTs", topic: "Market insights", cta: "RT if you agree" },
            { hook: "How I 10x my productivity", topic: "Tools & systems", cta: "Thread below 🧵" },
            { hook: "Web3 growth hacks that actually work", topic: "Growth strategies", cta: "Follow for more" },
            { hook: "Why community > marketing", topic: "Community building", cta: "Share your thoughts" }
        ];

        for (let i = 1; i <= 30; i++) {
            const topic = topics[(i - 1) % topics.length];
            plan.push({
                day: i,
                hook: topic.hook,
                topic: topic.topic,
                cta: topic.cta,
                completed: false
            });
        }
        return plan;
    }

    function loadData() {
        try {
            const saved = localStorage.getItem('growthOSData');
            if (saved) {
                const parsed = JSON.parse(saved);
                // Merge saved data with defaults
                appData = { ...appData, ...parsed };
                
                // Check if it's a new day
                const today = new Date().toISOString().split('T')[0];
                if (appData.currentDate !== today) {
                    // Save yesterday's data to history before switching
                    if (appData.todayData && Object.keys(appData.todayData).length > 0) {
                        appData.todayData.date = appData.currentDate;
                        appData.history[appData.currentDate] = appData.todayData;
                    }
                    // Reset for new day
                    appData.currentDate = today;
                    appData.todayData = {};
                }
                
                console.log('Data loaded from storage');
            }
        } catch (e) {
            console.error('Error loading data:', e);
        }
    }

    function saveData() {
        try {
            localStorage.setItem('growthOSData', JSON.stringify(appData));
            console.log('Data saved to LocalStorage');
        } catch (e) {
            console.error('Error saving data:', e);
        }
    }

    function handleTradeToggle(checked) {
        const details = document.getElementById('tradeDetails');
        if (checked) {
            details.classList.remove('hidden');
        } else {
            details.classList.add('hidden');
        }
    }

    function updateTask(category, field, value) {
        const today = appData.currentDate;
        
        // Initialize today's data structure
        if (!appData.todayData) {
            appData.todayData = {};
        }
        
        if (!appData.todayData[category]) {
            appData.todayData[category] = {};
        }
        
        // Save the value
        appData.todayData[category][field] = value;
        
        // Save to localStorage immediately
        saveData();
        
        // Update progress UI
        updateProgress();
        
        // Check if all tasks completed
        if (isDayCompleted(appData.todayData)) {
            console.log('All tasks completed! Showing celebration...');
            setTimeout(() => {
                showCompletionModal();
                triggerConfetti();
                // Mark today in weekly progress
                updateWeeklyProgress(true);
            }, 500);
        }
    }

    function isDayCompleted(data) {
        if (!data) return false;
        
        const checks = [
            data.trading?.tradeTaken,
            data.career?.jobSearch,
            data.career?.opportunities,
            data.content?.instagramReel,
            data.content?.youtubeLive,
            data.content?.tweetPosted,
            data.health?.gymDone,
            data.health?.walkCompleted,
            data.learning?.learningDone,
            data.learning?.projectBuilding
        ];
        
        return checks.every(check => check === true);
    }

    function updateProgress() {
        const data = appData.todayData || {};
        const total = 10;
        let completed = 0;
        
        if (data.trading?.tradeTaken) completed++;
        if (data.career?.jobSearch) completed++;
        if (data.career?.opportunities) completed++;
        if (data.content?.instagramReel) completed++;
        if (data.content?.youtubeLive) completed++;
        if (data.content?.tweetPosted) completed++;
        if (data.health?.gymDone) completed++;
        if (data.health?.walkCompleted) completed++;
        if (data.learning?.learningDone) completed++;
        if (data.learning?.projectBuilding) completed++;
        
        const percent = Math.round((completed / total) * 100);
        document.getElementById('progressPercent').textContent = percent + '%';
        
        // Update circle
        const circle = document.getElementById('progressCircle');
        const circumference = 175.9;
        const offset = circumference - (percent / 100) * circumference;
        circle.style.strokeDashoffset = offset;
        
        // Update streak
        document.getElementById('streakDisplay').textContent = appData.streak + ' 🔥';
        
        return percent;
    }

    function initializeTodayData() {
        const data = appData.todayData || {};
        
        // Load trading data
        if (data.trading) {
            document.getElementById('tradeTaken').checked = data.trading.tradeTaken || false;
            document.getElementById('tradeResult').value = data.trading.result || '';
            document.getElementById('tradeRR').value = data.trading.rr || '';
            document.getElementById('tradeReason').value = data.trading.reason || '';
            if (data.trading.tradeTaken) {
                document.getElementById('tradeDetails').classList.remove('hidden');
            }
        }
        
        // Load career data
        if (data.career) {
            document.getElementById('jobSearch').checked = data.career.jobSearch || false;
            document.getElementById('dmsSent').value = data.career.dmsSent || '';
            document.getElementById('opportunities').checked = data.career.opportunities || false;
        }
        
        // Load content data
        if (data.content) {
            document.getElementById('instagramReel').checked = data.content.instagramReel || false;
            document.getElementById('youtubeLive').checked = data.content.youtubeLive || false;
            document.getElementById('tweetPosted').checked = data.content.tweetPosted || false;
        }
        
        // Load health data
        if (data.health) {
            document.getElementById('gymDone').checked = data.health.gymDone || false;
            document.getElementById('walkCompleted').checked = data.health.walkCompleted || false;
            document.getElementById('waterIntake').value = data.health.waterIntake || '';
        }
        
        // Load learning data
        if (data.learning) {
            document.getElementById('learningDone').checked = data.learning.learningDone || false;
            document.getElementById('projectBuilding').checked = data.learning.projectBuilding || false;
        }
        
        // Update progress display
        updateProgress();
    }

    function updateWeeklyProgress(completed) {
        const today = new Date().getDay();
        const dayIndex = today === 0 ? 6 : today - 1; // Monday = 0
        appData.weeklyProgress[dayIndex] = completed;
        renderWeeklyBar();
        saveData();
    }

    function renderWeeklyBar() {
        const days = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
        const container = document.getElementById('weeklyBar');
        container.innerHTML = '';
        
        let completedDays = 0;
        
        days.forEach((day, index) => {
            const completed = appData.weeklyProgress[index];
            if (completed) completedDays++;
            
            const div = document.createElement('div');
            div.className = `flex-1 h-10 rounded-lg flex items-center justify-center font-bold text-sm transition-all ${completed ? 'bg-gradient-to-br from-purple-500 to-cyan-500 text-white' : 'bg-white/5 text-gray-500'}`;
            div.textContent = day;
            container.appendChild(div);
        });
        
        document.getElementById('weeklyStats').textContent = `${completedDays}/7 days`;
    }

    function switchTab(tabName) {
        // Hide all tabs
        document.querySelectorAll('.tab-content').forEach(tab => {
            tab.classList.add('hidden');
        });
        
        // Show selected tab
        document.getElementById(tabName).classList.remove('hidden');
        
        // Update tab buttons
        document.querySelectorAll('[id^="tab-"]').forEach(btn => {
            btn.classList.remove('tab-active');
            btn.classList.add('hover:bg-white/5');
        });
        
        const activeBtn = document.getElementById('tab-' + tabName);
        activeBtn.classList.add('tab-active');
        activeBtn.classList.remove('hover:bg-white/5');
        
        // Render specific content
        if (tabName === 'content') renderContentPlanner();
        if (tabName === 'history') renderHistory();
        if (tabName === 'ai') refreshAISuggestions();
    }

    function renderContentPlanner() {
        const container = document.getElementById('contentPlanner');
        container.innerHTML = '';
        
        appData.contentPlan.forEach((day, index) => {
            const card = document.createElement('div');
            card.className = `glass-card rounded-xl p-4 border transition-all cursor-pointer hover:border-purple-500/50 ${day.completed ? 'border-green-500/50 bg-green-500/5' : 'border-white/10'}`;
            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <span class="text-xs font-bold text-gray-400 bg-white/10 px-2 py-1 rounded">Day ${day.day}</span>
                    ${day.completed ? '<i class="fas fa-check-circle text-green-500"></i>' : ''}
                </div>
                <div class="space-y-2">
                    <div>
                        <p class="text-xs text-purple-400 font-semibold mb-1">HOOK</p>
                        <p class="text-sm font-medium leading-tight text-gray-200" contenteditable="true" onblur="updateContentPlan(${index}, 'hook', this.innerText)">${day.hook}</p>
                    </div>
                    <div>
                        <p class="text-xs text-blue-400 font-semibold mb-1">TOPIC</p>
                        <p class="text-sm text-gray-300" contenteditable="true" onblur="updateContentPlan(${index}, 'topic', this.innerText)">${day.topic}</p>
                    </div>
                    <div>
                        <p class="text-xs text-cyan-400 font-semibold mb-1">CTA</p>
                        <p class="text-sm text-gray-400" contenteditable="true" onblur="updateContentPlan(${index}, 'cta', this.innerText)">${day.cta}</p>
                    </div>
                </div>
                <button onclick="toggleContentDay(${index})" class="mt-3 w-full py-2 rounded-lg text-xs font-medium transition-colors ${day.completed ? 'bg-green-500/20 text-green-400 hover:bg-green-500/30' : 'bg-white/5 text-gray-400 hover:bg-white/10'}">
                    ${day.completed ? 'Completed' : 'Mark Complete'}
                </button>
            `;
            container.appendChild(card);
        });
    }

    function updateContentPlan(index, field, value) {
        appData.contentPlan[index][field] = value;
        saveData();
    }

    function toggleContentDay(index) {
        appData.contentPlan[index].completed = !appData.contentPlan[index].completed;
        saveData();
        renderContentPlanner();
    }

    function generateTrendingIdeas() {
        const trends = [
            { title: "Solana Breakpoint Recap", category: "Events", engagement: "High" },
            { title: "Jupiter Airdrop Strategy", category: "DeFi", engagement: "Viral" },
            { title: "NFT Market Analysis", category: "Trading", engagement: "Medium" },
            { title: "Web3 Onboarding UX", category: "Product", engagement: "High" },
            { title: "Crypto Twitter Growth", category: "Marketing", engagement: "Viral" },
            { title: "DAO Governance Models", category: "Community", engagement: "Medium" }
        ];
        
        const container = document.getElementById('trendingIdeas');
        container.innerHTML = '';
        
        trends.forEach(trend => {
            const div = document.createElement('div');
            div.className = 'bg-white/5 rounded-lg p-4 border border-white/10 hover:border-purple-500/50 transition-colors cursor-pointer';
            div.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <span class="text-xs font-bold text-purple-400">${trend.category}</span>
                    <span class="text-xs ${trend.engagement === 'Viral' ? 'text-red-400' : 'text-green-400'}">${trend.engagement}</span>
                </div>
                <p class="font-medium text-sm text-gray-200">${trend.title}</p>
            `;
            container.appendChild(div);
        });
        
        document.getElementById('trendingSection').classList.remove('hidden');
    }

    function renderHistory() {
        const container = document.getElementById('historyList');
        const filter = document.getElementById('historyFilter').value;
        container.innerHTML = '';
        
        // Get all history entries (excluding today)
        const entries = Object.values(appData.history)
            .sort((a, b) => new Date(b.date) - new Date(a.date));
        
        console.log('Rendering history. Entries found:', entries.length, entries);
        
        if (entries.length === 0) {
            document.getElementById('emptyHistory').classList.remove('hidden');
            return;
        }
        
        document.getElementById('emptyHistory').classList.add('hidden');
        
        entries.forEach(entry => {
            if (filter === 'trading' && !entry.trading?.tradeTaken) return;
            if (filter === 'completed' && !isDayCompleted(entry)) return;
            
            const completed = isDayCompleted(entry);
            const card = document.createElement('div');
            card.className = 'entry-card glass-card rounded-xl p-5 border border-white/10 hover:border-purple-500/30 transition-all relative group';
            
            let tradingInfo = '';
            if (entry.trading?.tradeTaken) {
                tradingInfo = `<span class="text-xs ${entry.trading.result === 'win' ? 'text-green-400' : 'text-red-400'}">
                    ${entry.trading.result === 'win' ? 'Win' : 'Loss'} ${entry.trading.rr ? `(${entry.trading.rr})` : ''}
                </span>`;
            }
            
            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <h4 class="font-bold text-lg text-white">${new Date(entry.date).toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}</h4>
                        <div class="flex items-center space-x-2 mt-1">
                            ${completed ? '<span class="text-xs bg-green-500/20 text-green-400 px-2 py-1 rounded">All Complete</span>' : ''}
                            ${tradingInfo}
                        </div>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="editEntry('${entry.date}')" class="edit-btn p-2 hover:bg-white/10 rounded-lg text-blue-400" title="Edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="deleteEntry('${entry.date}')" class="delete-btn p-2 hover:bg-red-500/20 rounded-lg text-red-400" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                    ${renderHistoryItem('Trading', entry.trading?.tradeTaken, entry.trading?.result)}
                    ${renderHistoryItem('Career', entry.career?.jobSearch && entry.career?.opportunities, `${entry.career?.dmsSent || 0} DMs`)}
                    ${renderHistoryItem('Content', entry.content?.instagramReel && entry.content?.youtubeLive && entry.content?.tweetPosted)}
                    ${renderHistoryItem('Health', entry.health?.gymDone && entry.health?.walkCompleted)}
                    ${renderHistoryItem('Learning', entry.learning?.learningDone && entry.learning?.projectBuilding)}
                </div>
                
                ${entry.trading?.reason ? `<p class="mt-3 text-xs text-gray-500 italic">"${entry.trading.reason}"</p>` : ''}
            `;
            
            container.appendChild(card);
        });
    }

    function renderHistoryItem(label, completed, extra = '') {
        return `
            <div class="flex items-center space-x-2">
                <i class="fas ${completed ? 'fa-check-circle text-green-500' : 'fa-circle text-gray-600'} text-xs"></i>
                <span class="text-gray-400">${label}</span>
                ${extra ? `<span class="text-xs text-gray-500">${extra}</span>` : ''}
            </div>
        `;
    }

    function editEntry(date) {
        currentEditDate = date;
        const entry = appData.history[date];
        const modal = document.getElementById('editModal');
        const form = document.getElementById('editForm');
        
        form.innerHTML = `
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Trade Taken</label>
                    <input type="checkbox" id="editTradeTaken" ${entry.trading?.tradeTaken ? 'checked' : ''} class="checkbox-custom">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Result</label>
                    <select id="editTradeResult" class="w-full px-3 py-2 rounded-lg text-sm bg-white/5 border border-white/10 text-white">
                        <option value="">Select</option>
                        <option value="win" ${entry.trading?.result === 'win' ? 'selected' : ''}>Win</option>
                        <option value="loss" ${entry.trading?.result === 'loss' ? 'selected' : ''}>Loss</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">RR Ratio</label>
                <input type="text" id="editTradeRR" value="${entry.trading?.rr || ''}" class="w-full px-3 py-2 rounded-lg text-sm bg-white/5 border border-white/10 text-white">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Reason</label>
                <input type="text" id="editTradeReason" value="${entry.trading?.reason || ''}" class="w-full px-3 py-2 rounded-lg text-sm bg-white/5 border border-white/10 text-white">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">DMs Sent</label>
                    <input type="number" id="editDmsSent" value="${entry.career?.dmsSent || ''}" class="w-full px-3 py-2 rounded-lg text-sm bg-white/5 border border-white/10 text-white">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Water</label>
                    <input type="number" id="editWater" value="${entry.health?.waterIntake || ''}" class="w-full px-3 py-2 rounded-lg text-sm bg-white/5 border border-white/10 text-white">
                </div>
            </div>
        `;
        
        modal.classList.remove('hidden');
    }

    function saveEdit() {
        if (!currentEditDate) return;
        
        const entry = appData.history[currentEditDate];
        if (!entry.trading) entry.trading = {};
        if (!entry.career) entry.career = {};
        if (!entry.health) entry.health = {};
        
        entry.trading.tradeTaken = document.getElementById('editTradeTaken').checked;
        entry.trading.result = document.getElementById('editTradeResult').value;
        entry.trading.rr = document.getElementById('editTradeRR').value;
        entry.trading.reason = document.getElementById('editTradeReason').value;
        entry.career.dmsSent = document.getElementById('editDmsSent').value;
        entry.health.waterIntake = document.getElementById('editWater').value;
        
        saveData();
        renderHistory();
        closeEditModal();
    }

    function closeEditModal() {
        document.getElementById('editModal').classList.add('hidden');
        currentEditDate = null;
    }

    function deleteEntry(date) {
        if (confirm('Delete this entry?')) {
            delete appData.history[date];
            saveData();
            renderHistory();
        }
    }

    function resetAllData() {
        if (confirm('WARNING: Delete ALL data?')) {
            localStorage.removeItem('growthOSData');
            location.reload();
        }
    }

    function refreshAISuggestions() {
        const tips = [
            "Focus on deep work: 90min blocks with no distractions",
            "Use the 2-minute rule: If it takes <2min, do it now",
            "Review your week every Sunday for 15 minutes",
            "Batch your content creation: Film 3 reels in one session",
            "Engage with 10 posts before posting your own"
        ];
        
        const ideas = [
            "Behind the scenes of a Web3 product launch",
            "My morning routine as a Growth Lead",
            "Analyzing successful NFT projects: What worked?",
            "How to write copy that converts in crypto",
            "The psychology of community building"
        ];
        
        const shuffledTips = tips.sort(() => 0.5 - Math.random()).slice(0, 3);
        const shuffledIdeas = ideas.sort(() => 0.5 - Math.random()).slice(0, 3);
        
        const tipsContainer = document.getElementById('productivityTips');
        tipsContainer.innerHTML = shuffledTips.map(tip => `
            <li class="flex items-start space-x-2">
                <i class="fas fa-check-circle text-green-500 mt-1"></i>
                <span>${tip}</span>
            </li>
        `).join('');
        
        const ideasContainer = document.getElementById('contentIdeas');
        ideasContainer.innerHTML = shuffledIdeas.map(idea => `
            <li class="flex items-start space-x-2">
                <i class="fas fa-star text-yellow-500 mt-1"></i>
                <span>"${idea}"</span>
            </li>
        `).join('');
    }

    function showCompletionModal() {
        const modal = document.getElementById('completionModal');
        const content = document.getElementById('modalContent');
        modal.classList.remove('hidden');
        setTimeout(() => {
            content.classList.remove('scale-95', 'opacity-0');
            content.classList.add('scale-100', 'opacity-100');
        }, 10);
    }

    function closeModal() {
        const modal = document.getElementById('completionModal');
        const content = document.getElementById('modalContent');
        content.classList.remove('scale-100', 'opacity-100');
        content.classList.add('scale-95', 'opacity-0');
        setTimeout(() => {
            modal.classList.add('hidden');
        }, 300);
    }

    function triggerConfetti() {
        const duration = 3000;
        const end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#a855f7', '#3b82f6', '#06b6d4']
            });
            confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#a855f7', '#3b82f6', '#06b6d4']
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());
    }

    function updateDateDisplay() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', options);
        document.getElementById('currentDay').textContent = `Day ${Math.ceil((now - new Date(now.getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24)} of ${now.getFullYear()}`;
    }

    function loadRandomQuote() {
        const quote = appData.quotes[Math.floor(Math.random() * appData.quotes.length)];
        document.getElementById('dailyQuote').textContent = `"${quote.text}"`;
        document.getElementById('quoteAuthor').textContent = `— ${quote.author}`;
    }

    function renderAll() {
        updateProgress();
        renderWeeklyBar();
    }

    // Save today's data to history when leaving page
    window.addEventListener('beforeunload', function() {
        if (appData.todayData && Object.keys(appData.todayData).length > 0) {
            appData.todayData.date = appData.currentDate;
            appData.history[appData.currentDate] = {...appData.todayData};
            saveData();
        }
    });
</script>
